server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/bicap_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: root
    password: your_password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

jwt:
  secret: bicap-super-secret-key-2024-must-be-at-least-256-bits-long
  expiration: 86400000   # 24 giờ (ms)